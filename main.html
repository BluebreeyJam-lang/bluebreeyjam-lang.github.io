<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超链接示例</title>
    <!-- 可选：简单样式让链接更美观 -->
    <style>
        a {
            color: #2c68c8; /* 蓝色系，符合网页链接常规配色 */
            text-decoration: none; /* 去掉默认下划线 */
            font-size: 16px;
        }
        a:hover {
            color: #1a4890; /* 鼠标悬浮时加深颜色 */
            text-decoration: underline; /* 悬浮时显示下划线 */
        }
    </style>
</head>
<body>
    <h1>超链接演示</h1>
    <!-- 核心超链接代码 -->
    <a href="test.html" target="_blank">点击跳转到 test.html</a>
</body>
</html>
